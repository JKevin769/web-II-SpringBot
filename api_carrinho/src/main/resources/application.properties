spring.application.name=api_carrinho
# Configura o Jackson para formatar a saída JSON de forma legível
spring.jackson.serialization.indent-output=true
# URL de conexão com o banco de dados MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/carrinho_db?createDatabaseIfNotExist=truespring.datasource.username=rootspring.datasource.password=admin\
 # Configurações do Hibernate
spring.jpa.hibernate.ddl-auto=updatespring.jpa.show-sql=truespring.jpa.properties.hibernate.format_sql=true
