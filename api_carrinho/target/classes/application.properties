spring:
  datasource:
  driver-class-name: com.mysql.cj.jdbc.Driver
  url: jdbc:mysql://localhost:3306/carrinho_db?useTimezone=true&serverTimezone=UTC
  username: root
  password: admin
  jpa:
  hibernate:
  ddl-auto: update
  properties:
   hibernate:
